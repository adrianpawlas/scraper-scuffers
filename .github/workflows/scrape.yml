name: Scuffers Scraper

on:
  schedule:
    # Run daily at 12pm UTC
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allow manual triggering
    inputs:
      test_mode:
        description: 'Run in test mode (3 products only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      max_products:
        description: 'Maximum number of products to scrape (optional)'
        required: false
        type: number

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 720  # 12 hours

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt

    - name: Run scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        # Determine test mode
        TEST_MODE="${{ github.event.inputs.test_mode }}"
        MAX_PRODS="${{ github.event.inputs.max_products }}"
        
        if [ "$TEST_MODE" = "true" ]; then
          echo "Running in TEST mode..."
          python main.py --test
        elif [ -n "$MAX_PRODS" ]; then
          echo "Running with max products: $MAX_PRODS"
          python main.py --max $MAX_PRODS
        else
          echo "Running full scrape..."
          python main.py
        fi

    - name: Report status
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ Scraper completed successfully"
        else
          echo "❌ Scraper failed. Check logs for details."
          exit 1
        fi
